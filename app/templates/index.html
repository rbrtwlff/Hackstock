<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Nebenkosten Viewer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>KI-Viewer Gewerberaummiete/Nebenkosten</h1>
  <div class="actions">
    <button onclick="runAll()">RUN ALL</button>
    <button onclick="retryFailed()">Retry Failed</button>
  </div>
  <div id="runStatus" class="card">Kein Job aktiv.</div>
  <div class="tabs">
    <button onclick="showTab('search')">Search</button>
    <button onclick="showTab('outline')">Outline</button>
    <button onclick="showTab('matrix')">Matrix</button>
    <button onclick="showTab('tables')">Tables</button>
  </div>

  <section id="search" class="tab">
    <h2>Suche</h2>
    <input id="q" placeholder="Volltext / Summary" /><label style="margin-left:12px"><input id="showRubrum" type="checkbox" onchange="loadSearch()" /> Rubrum anzeigen</label><button onclick="loadSearch()">Suchen</button>
    <div id="mergeStats"></div>
    <div id="searchResults"></div>
  </section>

  <section id="outline" class="tab hidden">
    <h2>Outline</h2>
    <div id="outlineData"></div>
  </section>

  <section id="matrix" class="tab hidden">
    <h2>Argumentations-Matrix</h2>
    <div class="matrix-toolbar">
      <label>Issue <select id="matrixIssue"></select></label>
      <label>Link-Type <select id="matrixLinkType"></select></label>
      <label>Status <select id="matrixStatus"></select></label>
      <label>Confidence &ge; <input id="matrixConfidence" type="number" min="0" max="1" step="0.05" value="0.70" /></label>
      <label><input id="matrixUnansweredOnly" type="checkbox" /> Nur unbeantwortete</label>
      <label><input id="matrixOurGapsOnly" type="checkbox" /> Nur "wir haben nicht geantwortet"</label>
      <button onclick="loadMatrixView()">Filter anwenden</button>
    </div>
    <div class="matrix-layout">
      <div id="matrixData" class="matrix-viewport"></div>
      <aside id="threadPanel" class="thread-panel">
        <h3>Thread-Ansicht</h3>
        <div id="threadData">Klicken Sie auf eine Argument-Card, um den Verlauf zu sehen.</div>
      </aside>
    </div>
  </section>

  <section id="tables" class="tab hidden">
    <h2>Tabellen</h2>
    <div id="tablesData"></div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
